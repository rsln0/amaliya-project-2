<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{background:#fdf4f7;font-family:'Jost',sans-serif;color:#4a2a30}

#confettiCanvas{position:fixed;inset:0;pointer-events:none;z-index:9000}

.spark{position:fixed;pointer-events:none;z-index:9999;animation:sparkPop .6s ease-out forwards}
@keyframes sparkPop{
  0%{opacity:1;transform:scale(.2) translateY(0)}
  100%{opacity:0;transform:scale(2.5) translateY(-50px)}
}

/* ════════════════════════════════
   PAGES
════════════════════════════════ */
.page{
  position:fixed;inset:0;
  transition:opacity .85s ease, transform .85s cubic-bezier(.4,0,.2,1);
  will-change:transform,opacity;
  pointer-events:none;
  opacity:0;
}
.page.active{pointer-events:auto;opacity:1 !important;transform:translateX(0) !important}

#pageBox{
  z-index:30;opacity:1;transform:translateX(0);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:radial-gradient(ellipse at 45% 35%,#fce6ef,#fdf0f6 55%,#fef8f8);
}
#pageBox.exit{opacity:0 !important;transform:translateX(-80px) !important;pointer-events:none !important}

#pageBouquet{
  z-index:20;transform:translateX(80px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 42%,#fff0f4,#fdf4f8 58%,#fef9f9);
}
#pageBouquet.exit-left{opacity:0 !important;transform:translateX(-80px) !important;pointer-events:none !important}

#pageLetter{
  z-index:10;transform:translateX(80px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 50%,#fef6f0,#fdf3f7 60%,#fef9f9);
}

/* ════════════════════════════════
   GIFT BOX
════════════════════════════════ */
#giftSVG{
  width:min(70vmin,460px);height:auto;overflow:visible;
  filter:drop-shadow(0 26px 58px rgba(110,30,45,.17)) drop-shadow(0 5px 13px rgba(110,30,45,.08));
}
#lid{transform-origin:200px 192px;transition:transform 1.3s cubic-bezier(.2,.05,.1,1)}
#lid.open{transform:rotate(-110deg)}
#ribV{transition:transform 1s cubic-bezier(.4,0,.2,1),opacity .9s}
#ribV.gone{transform:translateY(-340px);opacity:0}
#ribH{transition:transform 1s cubic-bezier(.4,0,.2,1),opacity .9s}
#ribH.gone{transform:translateY(340px);opacity:0}
#bowEl{transition:transform 1s cubic-bezier(.3,0,.2,1),opacity .9s;transform-box:fill-box;transform-origin:center}
#bowEl.gone{transform:translateY(-50px) scale(.15);opacity:0}

#boxHint{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:4px;text-transform:uppercase;
  color:#b07080;font-weight:300;white-space:nowrap;
  transition:opacity .4s;text-shadow:0 1px 8px rgba(255,255,255,.9);
}
#boxHint.off{opacity:0}

/* ════════════════════════════════
   BOUQUET
════════════════════════════════ */
.bq-img-wrap{
  width:min(87vmin,600px);flex-shrink:0;margin-bottom:70px;
  opacity:0;transform:scale(.92) translateY(12px);
  transition:opacity 1s ease .35s,transform 1s ease .35s;
}
#pageBouquet.active .bq-img-wrap{opacity:1;transform:scale(1) translateY(0)}
.bq-img-wrap img{
  width:100%;display:block;
  filter:drop-shadow(0 20px 52px rgba(110,30,45,.24));
  animation:gentleHover 5s ease-in-out infinite;
}
@keyframes gentleHover{
  0%,100%{transform:translateY(0) rotate(-.8deg)}
  50%{transform:translateY(-10px) rotate(.8deg)}
}

#bouquetMsg{
  position:absolute;bottom:0;left:0;right:0;padding:22px 20px 32px;text-align:center;
  background:linear-gradient(to top,rgba(253,244,247,.98) 55%,rgba(253,244,247,0));
  pointer-events:none;opacity:0;transform:translateY(10px);
  transition:opacity .9s ease .7s,transform .9s ease .7s;
}
#pageBouquet.active #bouquetMsg{opacity:1;transform:translateY(0)}
#bouquetMsg p{
  font-family:'Cormorant Garamond',serif;font-size:clamp(19px,3.8vw,30px);
  font-style:italic;font-weight:300;color:#7a3a48;letter-spacing:.5px;line-height:1.45;
}

/* Arrow to letter */
#arrowBtn{
  position:absolute;bottom:28px;right:28px;
  width:50px;height:50px;border-radius:50%;
  background:linear-gradient(135deg,#e07080,#b84055);
  border:none;cursor:pointer;box-shadow:0 6px 20px rgba(110,30,45,.28);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(0);
  transition:opacity .5s ease 1.4s,transform .5s cubic-bezier(.34,1.56,.64,1) 1.4s,background .2s;
  pointer-events:none;
}
#pageBouquet.active #arrowBtn{opacity:1;transform:scale(1);pointer-events:auto}
#arrowBtn:hover{background:linear-gradient(135deg,#ea8090,#c04060)}
#arrowBtn svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* Back button */
#backBtn{
  position:absolute;top:24px;left:24px;
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;gap:7px;
  color:#b07080;font-family:'Jost',sans-serif;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:300;
  opacity:0;transition:opacity .6s ease .4s;pointer-events:none;
}
#pageLetter.active #backBtn{opacity:1;pointer-events:auto}
#backBtn:hover{color:#7a3a48}
#backBtn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* ════════════════════════════════
   LETTER — folded in half
   
   Concept:
   - The "paper" is one sheet, visually split at the fold line (middle).
   - Bottom half = always visible (front bottom of folded letter).
   - Top half = starts folded down ON TOP of the bottom half (rotateX 180°
     around the fold = the shared bottom edge of the top half).
   - On click → top half rotates back to 0° = letter opens flat.

   We wrap everything in a perspective container.
   The fold line is the border between #halfBottom and #halfTop.
════════════════════════════════ */

/* Hint below letter */
#letterHint{
  margin-top:18px;
  font-size:10px;letter-spacing:3.5px;text-transform:uppercase;
  color:#c09090;font-weight:300;
  transition:opacity .5s;
  pointer-events:none;
}
#letterHint.off{opacity:0}

/* Perspective wrapper — centred on page */
#letterWrap{
  perspective:1400px;
  perspective-origin:50% 100%; /* hinge at bottom of top half = fold line */
  width:min(300px,82vw);
  cursor:pointer;
  /* entrance animation */
  opacity:0;transform:translateY(32px) scale(.94);
  transition:opacity .7s ease .35s, transform .7s ease .35s;
}
#pageLetter.active #letterWrap{opacity:1;transform:translateY(0) scale(1)}

/* Paper texture shared */
.half{
  width:100%;
  background:#fffaf6;
  border-left:1px solid rgba(180,115,125,.15);
  border-right:1px solid rgba(180,115,125,.15);
  position:relative;
  overflow:hidden;
}

/* ── BOTTOM HALF (always flat, never moves) ── */
#halfBottom{
  /* height set to match halfTop so together they look like one sheet */
  min-height:160px;
  border-bottom:1px solid rgba(180,115,125,.2);
  border-radius:0 0 8px 8px;
  box-shadow:0 18px 55px rgba(110,30,45,.18), 0 3px 10px rgba(110,30,45,.09);
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:26px;
}

/* Bottom content: seal + bottom half text (visible when folded) */
#bottomInner{
  text-align:center;
}
#bottomInner .seal{
  font-size:30px;
  display:block;
  margin-bottom:6px;
  animation:sealPulse 3s ease-in-out infinite;
}
@keyframes sealPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* Fold crease line between the two halves */
#foldLine{
  width:100%;
  height:0;
  position:relative;
  z-index:10;
}
#foldLine::before{
  content:'';
  position:absolute;left:0;right:0;top:-1px;
  height:2px;
  background:linear-gradient(90deg,transparent 0%,rgba(180,110,120,.35) 20%,rgba(200,130,140,.5) 50%,rgba(180,110,120,.35) 80%,transparent 100%);
  /* subtle shadow to simulate the crease */
  box-shadow:0 1px 4px rgba(110,30,45,.12);
}

/* ── TOP HALF (folds down over bottom, then opens up) ── */
/*
  transform-origin: bottom = the fold line.
  rotateX(180deg) = folded flat on top of bottom half (face down).
  rotateX(0deg)   = fully open, flat above bottom half.
*/
#halfTopOuter{
  transform-origin: bottom center;
  transform: rotateX(180deg);
  transition: transform .95s cubic-bezier(.4,0,.15,1);
  transform-style: preserve-3d;
}
#halfTopOuter.open{
  transform: rotateX(0deg);
}

/* front face of top half (the writing side) */
#halfTop{
  min-height:160px;
  border-top:1px solid rgba(180,115,125,.2);
  border-radius:8px 8px 0 0;
  box-shadow:0 -4px 18px rgba(110,30,45,.09);
  display:flex;align-items:flex-start;justify-content:center;
  padding-top:26px;
  /* backface hidden so you don't see through it when spinning */
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}

/* back face of top half (blank, shown while still folded) */
#halfTopBack{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,#fde8ee,#fff2f5);
  border-radius:8px 8px 0 0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  transform:rotateX(180deg);
  /* tiny texture lines to look like paper back */
  background-image:
    linear-gradient(to bottom,#fde8ee,#fff2f5),
    repeating-linear-gradient(0deg,transparent,transparent 22px,rgba(180,110,120,.06) 22px,rgba(180,110,120,.06) 23px);
  background-blend-mode:normal;
}

/* ── LETTER TEXT ── */
#topInner{
  text-align:center;
  padding:0 28px;
}
/* ✏️ EDIT THE LETTER TEXT INSIDE THE <p> IN THE HTML BELOW */
#topInner p{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(16px,2.8vw,22px);
  font-style:italic;font-weight:300;
  color:#6a3040;line-height:1.78;letter-spacing:.35px;
}

/* line ruling behind text (like real letter paper) */
#halfBottom::before, #halfTop::before{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 27px,
    rgba(200,140,150,.10) 27px,
    rgba(200,140,150,.10) 28px
  );
  pointer-events:none;
}

</style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>

<!-- ═══ PAGE 1 — BOX ═══ -->
<div id="pageBox" class="page active" onclick="onBoxClick(event)">
  <svg id="giftSVG" viewBox="0 0 400 460" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gBox" x1="0" y1="0" x2=".2" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f2eded"/></linearGradient>
      <linearGradient id="gLid" x1="0" y1="0" x2=".2" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#eeebeb"/></linearGradient>
      <linearGradient id="gRibV" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#7a2030"/><stop offset="18%" stop-color="#b85060"/><stop offset="38%" stop-color="#e898a4"/><stop offset="50%" stop-color="#f8bcc4"/><stop offset="62%" stop-color="#e898a4"/><stop offset="82%" stop-color="#b85060"/><stop offset="100%" stop-color="#7a2030"/>
      </linearGradient>
      <linearGradient id="gRibH" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#7a2030"/><stop offset="18%" stop-color="#b85060"/><stop offset="38%" stop-color="#e898a4"/><stop offset="50%" stop-color="#f8bcc4"/><stop offset="62%" stop-color="#e898a4"/><stop offset="82%" stop-color="#b85060"/><stop offset="100%" stop-color="#7a2030"/>
      </linearGradient>
    </defs>
    <rect x="60" y="196" width="280" height="240" rx="5" fill="url(#gBox)"/>
    <rect x="60" y="196" width="280" height="240" rx="5" fill="none" stroke="rgba(160,100,110,.09)" stroke-width="1"/>
    <rect x="60" y="196" width="7" height="240" fill="rgba(0,0,0,.03)" rx="3"/>
    <rect x="333" y="196" width="7" height="240" fill="rgba(0,0,0,.02)" rx="3"/>
    <rect x="66" y="428" width="268" height="8" rx="4" fill="rgba(0,0,0,.05)"/>
    <rect x="60" y="196" width="280" height="2" rx="1" fill="rgba(255,255,255,.85)"/>
    <g id="lid">
      <rect x="50" y="138" width="300" height="62" rx="5" fill="url(#gLid)"/>
      <rect x="50" y="138" width="300" height="62" rx="5" fill="none" stroke="rgba(160,100,110,.07)" stroke-width="1"/>
      <rect x="50" y="138" width="300" height="3" rx="2" fill="rgba(255,255,255,.9)"/>
      <rect x="50" y="192" width="300" height="6" rx="2" fill="rgba(0,0,0,.05)"/>
    </g>
    <g id="ribV">
      <rect x="184" y="138" width="32" height="298" fill="url(#gRibV)"/>
      <rect x="184" y="138" width="3" height="298" fill="rgba(255,255,255,.2)"/>
      <rect x="213" y="138" width="3" height="298" fill="rgba(0,0,0,.07)"/>
    </g>
    <g id="ribH">
      <rect x="50" y="165" width="300" height="27" fill="url(#gRibH)"/>
      <rect x="50" y="165" width="300" height="2" fill="rgba(255,255,255,.2)"/>
      <rect x="50" y="190" width="300" height="2" fill="rgba(0,0,0,.06)"/>
      <rect x="60" y="295" width="280" height="29" fill="url(#gRibH)"/>
      <rect x="60" y="295" width="280" height="2" fill="rgba(255,255,255,.2)"/>
      <rect x="60" y="322" width="280" height="2" fill="rgba(0,0,0,.06)"/>
    </g>
    <g id="bowEl">
      <path d="M194,154 Q180,172 168,188" stroke="url(#gRibV)" stroke-width="18" fill="none" stroke-linecap="round"/>
      <path d="M194,154 Q180,172 168,188" stroke="rgba(255,255,255,.26)" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M206,154 Q220,172 232,188" stroke="url(#gRibV)" stroke-width="18" fill="none" stroke-linecap="round"/>
      <path d="M206,154 Q220,172 232,188" stroke="rgba(255,255,255,.26)" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M200,148 C192,134 158,102 134,94 C112,87 100,100 106,115 C112,130 140,136 164,143 C180,147 196,149 200,148Z" fill="url(#gRibV)" stroke="#6a1828" stroke-width=".8"/>
      <path d="M199,146 C189,132 156,104 136,96 C118,89 108,101 111,113" fill="none" stroke="rgba(255,255,255,.28)" stroke-width="5" stroke-linecap="round"/>
      <path d="M200,148 C208,134 242,102 266,94 C288,87 300,100 294,115 C288,130 260,136 236,143 C220,147 204,149 200,148Z" fill="url(#gRibV)" stroke="#6a1828" stroke-width=".8"/>
      <path d="M201,146 C211,132 244,104 264,96 C282,89 292,101 289,113" fill="none" stroke="rgba(255,255,255,.28)" stroke-width="5" stroke-linecap="round"/>
      <ellipse cx="200" cy="148" rx="17" ry="13" fill="url(#gRibH)" stroke="#6a1828" stroke-width="1"/>
      <ellipse cx="200" cy="148" rx="8" ry="6" fill="rgba(210,80,95,.55)"/>
      <ellipse cx="196" cy="144" rx="5" ry="3" fill="rgba(255,255,255,.3)"/>
    </g>
  </svg>
  <div id="boxHint">✦ &nbsp;click to open&nbsp; ✦</div>
</div>

<!-- ═══ PAGE 2 — BOUQUET ═══ -->
<div id="pageBouquet" class="page">
  <div class="bq-img-wrap">
    <img src="bouquet.png" alt="Bouquet" onerror="this.style.opacity='.3'"/>
  </div>
  <div id="bouquetMsg">
    <!-- ✏️ EDIT MESSAGE HERE -->
    <p>for you my love )</p>
  </div>
  <button id="arrowBtn" onclick="goToLetter()" aria-label="Open letter">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

<!-- ═══ PAGE 3 — LETTER ═══ -->
<div id="pageLetter" class="page">

  <button id="backBtn" onclick="goToBouquet()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    back
  </button>

  <!--
    LETTER STRUCTURE
    ┌─────────────────┐  ← #halfTopOuter  (rotates around bottom edge = fold line)
    │   TOP HALF      │     starts face-down ON the bottom half
    │   (your text)   │     click → flips up flat above fold
    ├─ ─ ─ ─ ─ ─ ─ ─ ┤  ← fold crease (#foldLine)
    │  BOTTOM HALF    │     always visible / never moves
    │   (seal ♡)      │
    └─────────────────┘
  -->

  <div id="letterWrap" onclick="unfoldLetter()">

    <!-- TOP HALF wrapper — this is what rotates -->
    <div id="halfTopOuter">
      <!-- back face (shown when still folded — blank paper back) -->
      <div id="halfTopBack"></div>
      <!-- front face (shown when open — your letter text) -->
      <div class="half" id="halfTop">
        <div id="topInner">

          <!-- ✏️✏️✏️ EDIT YOUR LETTER TEXT HERE ✏️✏️✏️ -->
          <p>
            Happy 8 of March mon amour —<br>
            I love you Amaliya <br>
            Today more than any day before <br>
            Thank you for coming into my life and for making me smile and laugh so much ) <br>
            Avec tout mon amour, <br>
            your boyfriend, Ruben <br>
          </p>
          <!-- ✏️✏️✏️ END EDITABLE ZONE ✏️✏️✏️ -->

        </div>
      </div>
    </div>

    <!-- FOLD CREASE -->
    <div id="foldLine"></div>

    <!-- BOTTOM HALF — never moves -->
    <div class="half" id="halfBottom">
      <div id="bottomInner">
        <span class="seal">♡</span>
      </div>
    </div>

  </div>

  <div id="letterHint">✦ &nbsp;click to unfold&nbsp; ✦</div>

</div>

<script>
/* ── CONFETTI ── */
const canvas=document.getElementById('confettiCanvas'),ctx=canvas.getContext('2d');
let pieces=[],animating=false;
function resizeCanvas(){canvas.width=innerWidth;canvas.height=innerHeight}
resizeCanvas();addEventListener('resize',resizeCanvas);
const COLS=['#f8b8c0','#f090a0','#e06070','#fde8a8','#ffd0e4','#b84055','#d4a0bc','#a8ccdc','#c8dca0','#f0d4a0'];
function launchConfetti(fx,fy){
  resizeCanvas();const cx=fx??innerWidth/2,cy=fy??innerHeight/2;
  for(let i=0;i<140;i++){
    const a=-Math.PI/2+(Math.random()-.5)*Math.PI*.9,spd=9+Math.random()*17;
    pieces.push({x:cx+(Math.random()-.5)*40,y:cy,vx:Math.cos(a)*spd*(0.4+Math.random()),vy:Math.sin(a)*spd-Math.random()*3,w:5+Math.random()*8,h:9+Math.random()*12,color:COLS[Math.random()*COLS.length|0],rot:Math.random()*360,rotV:(Math.random()-.5)*11,grav:.32+Math.random()*.18,op:1,shape:Math.random()<.28?'dot':'rect'});
  }
  if(!animating){animating=true;requestAnimationFrame(tick)}
}
function tick(){
  ctx.clearRect(0,0,canvas.width,canvas.height);let live=false;
  for(const p of pieces){
    p.vy+=p.grav;p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;p.vx*=.99;
    if(p.y>canvas.height+30){p.op=0;continue}
    if(p.y>canvas.height*.55)p.op=Math.max(0,p.op-.016);
    if(p.op<=0)continue;live=true;
    ctx.save();ctx.globalAlpha=p.op;ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;
    if(p.shape==='dot'){ctx.beginPath();ctx.arc(0,0,p.w/2,0,Math.PI*2);ctx.fill()}
    else ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();
  }
  if(live)requestAnimationFrame(tick);
  else{animating=false;pieces=[];ctx.clearRect(0,0,canvas.width,canvas.height)}
}

/* ── SPARKLES ── */
function sparks(x,y,sym){
  for(let i=0;i<8;i++){
    const el=document.createElement('div');el.className='spark';el.textContent=sym;
    el.style.left=(x+(Math.random()-.5)*80)+'px';
    el.style.top=(y+(Math.random()-.5)*80)+'px';
    el.style.fontSize=(9+Math.random()*14)+'px';
    el.style.animationDuration=(.28+Math.random()*.38)+'s';
    document.body.appendChild(el);setTimeout(()=>el.remove(),700);
  }
}

/* ── PAGE NAV ── */
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ── BOX ── */
let bc=0,boxLocked=false;
function onBoxClick(e){
  if(bc>=4||boxLocked)return;boxLocked=true;bc++;
  sparks(e.clientX,e.clientY,'✦');
  const hint=document.getElementById('boxHint');
  if(bc===1){document.getElementById('ribV').classList.add('gone');hint.textContent='✦ \u00A0again...\u00A0 ✦';setTimeout(()=>boxLocked=false,800)}
  else if(bc===2){document.getElementById('ribH').classList.add('gone');hint.textContent='✦ \u00A0once more...\u00A0 ✦';setTimeout(()=>boxLocked=false,800)}
  else if(bc===3){document.getElementById('bowEl').classList.add('gone');hint.textContent='✦ \u00A0open it!\u00A0 ✦';setTimeout(()=>boxLocked=false,800)}
  else{
    document.getElementById('lid').classList.add('open');
    document.getElementById('boxHint').classList.add('off');
    launchConfetti(e.clientX,e.clientY);
    setTimeout(()=>{document.getElementById('pageBox').classList.add('exit');showPage('pageBouquet')},1100);
  }
}

/* ── BOUQUET → LETTER ── */
function goToLetter(){
  document.getElementById('pageBouquet').classList.add('exit-left');
  setTimeout(()=>showPage('pageLetter'),50);
}

/* ── LETTER → BOUQUET ── */
function goToBouquet(){
  document.getElementById('pageBouquet').classList.remove('exit-left');
  showPage('pageBouquet');
  // reset letter
  letterOpened=false;
  document.getElementById('halfTopOuter').classList.remove('open');
  document.getElementById('letterHint').classList.remove('off');
}

/* ── LETTER UNFOLD ── */
let letterOpened=false;
function unfoldLetter(){
  if(letterOpened)return;
  letterOpened=true;
  document.getElementById('halfTopOuter').classList.add('open');
  document.getElementById('letterHint').classList.add('off');
  sparks(innerWidth/2, innerHeight/2,'♡');
}
</script>
</body>
</html>
